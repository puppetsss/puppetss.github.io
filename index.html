<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你是《逐玉》里的谁？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
        }

        body {
            /* 浅玉色背景，替代纯灰白 */
            background-color: #f5f7f5;
            color: #333;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
            background-image: linear-gradient(to bottom, #f5f7f5, #eef1ee);
            min-height: 100vh;
        }

        /* 答题页 - 轻质感设计 */
        .question-container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(180, 190, 180, 0.1);
            margin-top: 20px;
            border: 1px solid #e8ebe8;
        }

        .question-header {
            font-size: 15px;
            /* 雅致灰绿色 */
            color: #788678;
            margin-bottom: 25px;
            text-align: right;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 35px;
            text-align: center;
            font-weight: 500;
            /* 深墨色，替代纯黑 */
            color: #2a332a;
        }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-btn {
            padding: 18px 24px;
            /* 浅玉色边框 */
            border: 1px solid #dee2de;
            border-radius: 16px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            background: #fff;
            color: #444;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            /* hover时浅青底色+深色边框 */
            background: #f0f5f0;
            border-color: #b8c6b8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(180, 190, 180, 0.1);
        }

        /* 结果页 - 国风轻质感配色 */
        .result-container {
            background: #fff;
            border-radius: 20px;
            padding: 50px 35px;
            box-shadow: 0 4px 20px rgba(180, 190, 180, 0.1);
            margin-top: 20px;
            display: none;
            border: 1px solid #e8ebe8;
            position: relative;
        }

        /* 结果页顶部轻装饰（无图片，纯css） */
        .result-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            /* 渐变玉色顶边 */
            background: linear-gradient(90deg, #a8b8a8, #8a988a, #a8b8a8);
            border-radius: 20px 20px 0 0;
        }

        .result-title {
            font-size: 28px;
            margin-bottom: 12px;
            /* 深墨色标题 */
            color: #2a332a;
            font-weight: 600;
            text-align: center;
            position: relative;
            padding-bottom: 10px;
        }

        .result-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            /* 浅玉色分隔线 */
            background: #b8c6b8;
        }

        .result-tag {
            font-size: 16px;
            /* 雅致灰绿色标签文字 */
            color: #687868;
            margin: 0 auto 35px;
            display: table;
            /* 浅青标签背景 */
            background: #f0f5f0;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #e8ebe8;
        }

        /* 正文首行缩进两格 */
        .result-desc {
            font-size: 18px;
            line-height: 2;
            /* 雅致深灰色文字 */
            color: #485048;
            margin-bottom: 35px;
            text-indent: 2em;
            text-align: justify;
        }

        .result-trait {
            margin: 0 0 35px;
            padding-left: 5px;
        }

        .result-trait li {
            list-style: none;
            padding: 10px 15px;
            font-size: 17px;
            color: #485048;
            /* 浅玉色背景条 */
            background: #f8faf8;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #b8c6b8;
        }

        .result-trait li::before {
            content: "• ";
            /* 玉色圆点 */
            color: #8a988a;
            margin-right: 8px;
            font-weight: 600;
        }

        .result-match {
            font-size: 17px;
            line-height: 1.9;
            color: #485048;
            text-indent: 2em;
            margin-bottom: 40px;
            text-align: justify;
        }

        .restart-btn {
            display: block;
            margin: 0 auto;
            padding: 16px 40px;
            border: none;
            border-radius: 16px;
            /* 墨色按钮 */
            background: #3a403a;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(58, 64, 58, 0.15);
        }

        .restart-btn:hover {
            /* hover时深墨色 */
            background: #2a332a;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(58, 64, 58, 0.2);
        }

        /* 响应式适配 */
        @media (max-width: 600px) {
            .question-container, .result-container {
                padding: 30px 20px;
            }
            .result-title {
                font-size: 24px;
            }
            .result-desc, .result-match {
                font-size: 16px;
            }
            .restart-btn {
                padding: 14px 36px;
            }
        }
    </style>
</head>

<body>

<div class="question-container" id="questionBox">

    </div>
</div>

<div class="result-container" id="resultBox">

    <button class="restart-btn" onclick="restartTest()">重新测试</button>

// 全局变量
let currentQ = 0; // 当前题目索引
let scores = { A: 0, B: 0, C: 0, D: 0 }; // 选项得分

// 选择选项
function selectOption(opt) {
    // 记录得分
    scores[opt]++;
    
    // 下一题
    currentQ++;
    if (currentQ < questions.length) {
        updateQuestion();
    } else {
        // 答题完成，计算结果
        showResult();
    }
}

// 更新题目
function updateQuestion() {
    document.getElementById("questionNum").innerText = `第 ${currentQ + 1} 题 / 共 30 题`;
    document.getElementById("questionText").innerText = questions[currentQ].text;
    
    // 更新选项文字
    const btns = document.querySelectorAll(".option-btn");
    btns.forEach(btn => {
        const opt = btn.getAttribute("onclick").split("'")[1]; // 获取选项A/B/C/D
        btn.innerText = `${opt}. ${questions[currentQ].options[opt]}`;
    });
}

// 计算并显示结果 - 贴合原著文案，保留空两格
function showResult() {
    // 隐藏答题区，显示结果区
    document.getElementById("questionBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";

    // 计算最高分选项
    let maxScore = 0;
    let maxOpt = "A";
    for (let opt in scores) {
        if (scores[opt] > maxScore) {
            maxScore = scores[opt];
            maxOpt = opt;
        }
    }

    // 匹配角色（按选项+得分细分，贴合原著人设）
    let charIndex = 0;
    switch(maxOpt) {
        case "A":
            charIndex = scores.A >= 10 ? 8 : 0; // A高=随元青，次高=樊长玉（贴合原著双强设定）
            break;
        case "B":
            if (scores.B >= 12) charIndex = 5; // B极高=魏严（权欲巅峰）
            else if (scores.B >= 8) charIndex = 1; // B高=谢征（隐忍腹黑）
            else charIndex = 6; // B次高=公孙鄞（智计谋臣）
            break;
        case "C":
            charIndex = scores.C >= 9 ? 4 : 2; // C高=齐姝（骄傲风骨），次高=俞浅浅（清醒独立）
            break;
        case "D":
            charIndex = scores.D >= 10 ? 7 : 3; // D高=齐旻（偏执疯批），次高=李怀安（温润君子）
            break;
    }

    // 填充结果内容（贴合原著，保留换行和空两格）
    const char = characters[charIndex];
    document.getElementById("resultName").innerText = `你是《逐玉》中的：${char.name}`;
    document.getElementById("resultTag").innerText = char.tag;
    document.getElementById("resultDesc").innerText = char.desc; // 保留空两格，贴合中文阅读习惯
    
    // 填充特质列表
    const traitList = document.getElementById("resultTrait");
    traitList.innerHTML = "";
    char.trait.forEach(trait => {
        const li = document.createElement("li");
        li.innerText = trait;
        traitList.appendChild(li);
    });

    // 填充角色适配建议（贴合原著剧情）
    document.getElementById("resultMatch").innerText = char.match;
}

// 重新测试
function restartTest() {
    // 重置变量
    currentQ = 0;
    scores = { A: 0, B: 0, C: 0, D: 0 };
    
    // 显示答题区，隐藏结果区
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("questionBox").style.display = "block";
    
    // 重置第一题
    updateQuestion();
}
