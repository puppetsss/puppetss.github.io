<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐玉角色测试｜你的逐玉世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f7f5f0; /* 米白底色，还原图中质感 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: "Noto Serif SC", "Songti SC", "SimSun", serif; /* 衬线字体，保持优雅感 */
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 0 20px;
        }

        .subtitle-small {
            font-size: 20px;
            color: #999;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 24px;
            color: #999;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 64px;
            font-weight: 700;
            color: #222;
            margin-bottom: 25px;
            letter-spacing: 3px;
            line-height: 1.2;
        }

        .desc {
            font-size: 18px;
            color: #999;
            margin-bottom: 60px;
            letter-spacing: 1px;
        }

        .start-btn {
            display: inline-block;
            padding: 20px 60px;
            background-color: #333;
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            border-radius: 0; /* 直角按钮，还原图中样式 */
            font-family: inherit;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background-color: #111;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: #aaa;
            font-family: sans-serif;
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .subtitle-small {
                font-size: 16px;
            }
            .subtitle {
                font-size: 20px;
            }
            .title {
                font-size: 42px;
                letter-spacing: 2px;
            }
            .desc {
                font-size: 16px;
            }
            .start-btn {
                padding: 16px 45px;
                font-size: 20px;
            }
        }
    </style>
    <!-- 引入衬线中文字体，保证跨设备显示一致 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap">
</head>
<body>
    <div class="container">
        <div class="subtitle-small">30题</div>
        <div class="subtitle">测测你是《逐玉》中的典型人物</div>
        <div class="title">你的逐玉世界</div>
        <div class="desc">／含角色解析与命运走向／</div>
        <a href="test.html" class="start-btn">开始翻阅</a>
    </div>
    <div class="footer">小红书：三舟树叶</div> <!-- 已修改小红书号 -->
</body>
</html>
